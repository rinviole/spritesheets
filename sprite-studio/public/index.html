<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprite Studio 🍌</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#111;--surface2:#181818;--border:#222;
  --accent:#f0e040;--text:#e8e8e8;--muted:#555;
  --green:#4ade80;--red:#f87171;--blue:#60a5fa;
}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh}
h1,h2,.label{font-family:'Syne',sans-serif}

/* Lock screen */
#lock-screen{
  position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:1rem;z-index:100;
}
#lock-screen h1{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--accent)}
#lock-screen p{font-size:12px;color:var(--muted)}
.lock-row{display:flex;gap:8px;margin-top:8px}
#pw-input{
  background:#000;border:1px solid var(--border);color:var(--text);
  font-family:'DM Mono',monospace;font-size:14px;padding:12px 16px;
  border-radius:8px;outline:none;width:240px;transition:border 0.15s;
}
#pw-input:focus{border-color:var(--accent)}
#pw-btn{
  background:var(--accent);color:#000;font-family:'Syne',sans-serif;
  font-weight:800;font-size:13px;padding:12px 20px;border:none;
  border-radius:8px;cursor:pointer;
}
#pw-err{font-size:11px;color:var(--red);height:14px}

/* App */
#app{display:none;max-width:720px;margin:0 auto;padding:2rem 1rem}

.studio-header{margin-bottom:2rem}
.studio-header h1{font-size:30px;font-weight:800;color:var(--accent);letter-spacing:-0.5px}
.studio-header p{font-size:11px;color:var(--muted);margin-top:4px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.card-label{font-size:10px;font-weight:700;letter-spacing:0.15em;color:var(--muted);text-transform:uppercase;margin-bottom:12px;font-family:'Syne',sans-serif}

/* Upload */
.upload-zone{border:1.5px dashed var(--border);border-radius:10px;padding:1.5rem;text-align:center;cursor:pointer;transition:all 0.15s}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:rgba(240,224,64,0.03)}
.upload-zone input{display:none}
.upload-icon{font-size:28px;margin-bottom:8px}
.upload-text{font-size:12px;color:var(--muted)}
#source-thumb{max-height:140px;border-radius:8px;border:1px solid var(--border);display:none;margin:10px auto 0;display:none}

/* Controls */
.controls-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ctrl{display:flex;flex-direction:column;gap:5px}
.ctrl label{font-size:10px;font-weight:700;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase;font-family:'Syne',sans-serif}
.ctrl select,.ctrl input[type=number]{
  background:#000;border:1px solid var(--border);color:var(--text);
  font-family:'DM Mono',monospace;font-size:12px;padding:8px 10px;
  border-radius:8px;outline:none;width:100%;transition:border 0.15s;
}
.ctrl select:focus,.ctrl input:focus{border-color:var(--accent)}

.gen-btn{
  width:100%;background:var(--accent);color:#000;font-family:'Syne',sans-serif;
  font-weight:800;font-size:15px;padding:15px;border:none;border-radius:10px;
  cursor:pointer;transition:all 0.15s;letter-spacing:0.05em;margin-top:4px;
}
.gen-btn:hover{opacity:0.9;transform:translateY(-1px)}
.gen-btn:disabled{opacity:0.25;cursor:not-allowed;transform:none}

/* Progress */
#progress-card{display:none}
.progress-bar-wrap{background:#000;border-radius:100px;height:3px;overflow:hidden;margin:10px 0}
.progress-bar{height:100%;background:var(--accent);border-radius:100px;transition:width 0.4s;width:0%}
.progress-log{font-size:11px;color:var(--muted);min-height:16px}
.frames-strip{display:flex;gap:5px;flex-wrap:wrap;margin-top:12px}
.frame-thumb{width:56px;height:56px;border-radius:6px;border:1px solid var(--border);object-fit:contain;background:#000;opacity:0.2;transition:opacity 0.4s}
.frame-thumb.done{opacity:1;border-color:var(--green)}
.frame-thumb.loading{opacity:0.5;border-color:var(--accent)}

/* Result */
#result-card{display:none}
.sheet-scroll{overflow-x:auto;padding-bottom:4px}
#sheet-canvas{display:block;border-radius:8px;border:1px solid var(--border);image-rendering:pixelated;max-height:100px}
.anim-row{display:flex;align-items:center;gap:1.25rem;flex-wrap:wrap;margin-top:14px}
#anim-canvas{border-radius:8px;border:1px solid var(--border);background:repeating-conic-gradient(#1a1a1a 0% 25%,#111 0% 50%) 0 0/16px 16px;image-rendering:pixelated;flex-shrink:0}
.anim-ctrl{flex:1;min-width:160px}
.fps-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.fps-row label{font-size:10px;font-weight:700;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase;font-family:'Syne',sans-serif}
#fps-val{font-size:13px;color:var(--accent);min-width:20px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.action-btn{
  background:transparent;border:1px solid var(--border);color:var(--text);
  font-family:'DM Mono',monospace;font-size:12px;padding:8px 14px;
  border-radius:8px;cursor:pointer;transition:all 0.15s;
}
.action-btn:hover{border-color:var(--accent);color:var(--accent)}
.cost-tag{font-size:10px;color:var(--muted);margin-top:10px;line-height:1.6}

.err-msg{font-size:12px;color:var(--red);margin-top:8px;display:none}
</style>
</head>
<body>

<!-- Lock Screen -->
<div id="lock-screen">
  <h1>🍌 SPRITE STUDIO</h1>
  <p>nano banana · gemini image api</p>
  <div class="lock-row">
    <input type="password" id="pw-input" placeholder="Erişim şifresi..." onkeydown="if(event.key==='Enter')unlock()">
    <button id="pw-btn" onclick="unlock()">Giriş</button>
  </div>
  <div id="pw-err"></div>
</div>

<!-- App -->
<div id="app">
  <div class="studio-header">
    <h1>SPRITE STUDIO 🍌</h1>
    <p>nano banana (gemini 2.5 flash image) · ai sprite sheet generator</p>
  </div>

  <div class="card">
    <div class="card-label">Karakter Görseli</div>
    <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-in').click()">
      <input type="file" id="file-in" accept="image/*">
      <div class="upload-icon">🎨</div>
      <div class="upload-text">Tıkla veya sürükle bırak · PNG, şeffaf arka plan ideal</div>
    </div>
    <img id="source-thumb">
  </div>

  <div class="card">
    <div class="card-label">Animasyon Ayarları</div>
    <div class="controls-grid">
      <div class="ctrl">
        <label>Animasyon Tipi</label>
        <select id="anim-type">
          <option value="walk cycle, side view, legs and arms moving">Yürüyüş</option>
          <option value="run cycle, side view, fast movement">Koşma</option>
          <option value="idle animation, subtle breathing and swaying">Bekleme</option>
          <option value="jump arc, from crouch to peak to landing">Zıplama</option>
          <option value="sword attack slash, wind-up and follow-through">Saldırı</option>
          <option value="death animation, falling down">Ölüm</option>
          <option value="victory celebration pose">Zafer</option>
          <option value="magic cast spell, arms raised with glow">Büyü</option>
        </select>
      </div>
      <div class="ctrl">
        <label>Frame Sayısı</label>
        <input type="number" id="frame-count" value="6" min="4" max="10">
      </div>
      <div class="ctrl">
        <label>Sanat Stili</label>
        <select id="art-style">
          <option value="16-bit pixel art style, pixelated, retro game">Pixel Art (16-bit)</option>
          <option value="8-bit pixel art style, very pixelated, NES era">Pixel Art (8-bit)</option>
          <option value="anime style, flat cel shading, clean outlines">Anime</option>
          <option value="cartoon style, bold black outlines, vibrant colors">Cartoon</option>
          <option value="detailed game art, semi-realistic, painterly">Detaylı</option>
        </select>
      </div>
      <div class="ctrl">
        <label>Arka Plan</label>
        <select id="bg-type">
          <option value="pure black background #000000">Siyah</option>
          <option value="transparent background (white checkerboard pattern)">Şeffaf görünüm</option>
          <option value="pure white background #ffffff">Beyaz</option>
        </select>
      </div>
    </div>
  </div>

  <button class="gen-btn" id="gen-btn" disabled onclick="generate()">🍌 SPRITE SHEET OLUŞTUR</button>
  <div class="err-msg" id="err-msg"></div>

  <div class="card" id="progress-card" style="margin-top:1rem">
    <div class="card-label">Üretiliyor</div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="prog-bar"></div></div>
    <div class="progress-log" id="prog-log"></div>
    <div class="frames-strip" id="frames-strip"></div>
  </div>

  <div class="card" id="result-card" style="margin-top:1rem">
    <div class="card-label">Sprite Sheet</div>
    <div class="sheet-scroll"><canvas id="sheet-canvas"></canvas></div>
    <div class="anim-row">
      <canvas id="anim-canvas" width="128" height="128"></canvas>
      <div class="anim-ctrl">
        <div class="fps-row">
          <label>FPS</label>
          <input type="range" min="4" max="24" value="10" step="1" id="fps-slider" oninput="setFps(this.value)" style="width:80px">
          <span id="fps-val">10</span>
        </div>
        <div class="btn-row">
          <button class="action-btn" id="play-btn" onclick="togglePlay()">⏸ Durdur</button>
          <button class="action-btn" onclick="downloadSheet()">⬇ PNG İndir</button>
        </div>
        <div class="cost-tag" id="cost-tag"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── AUTH ──────────────────────────────────────────
let appPassword = '';

function unlock() {
  const pw = document.getElementById('pw-input').value.trim();
  if (!pw) return;
  appPassword = pw;
  // Test with a tiny request
  callGemini('gemini-2.5-flash', {
    contents: [{ parts: [{ text: 'hi' }] }],
    generationConfig: { maxOutputTokens: 5 }
  }).then(() => {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  }).catch(err => {
    if (err.message === 'Unauthorized') {
      document.getElementById('pw-err').textContent = '✗ Yanlış şifre';
    } else {
      // Password ok but maybe API error — still let in
      document.getElementById('lock-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
    }
  });
}

// ── API PROXY ─────────────────────────────────────
async function callGemini(model, body) {
  const res = await fetch('/.netlify/functions/gemini', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-app-password': appPassword
    },
    body: JSON.stringify({ model, body })
  });
  const data = await res.json();
  if (res.status === 401) throw new Error('Unauthorized');
  if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
  return data;
}

// ── UPLOAD ────────────────────────────────────────
let sourceDataUrl = null;

document.getElementById('file-in').addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = e2 => {
    sourceDataUrl = e2.target.result;
    const thumb = document.getElementById('source-thumb');
    thumb.src = sourceDataUrl;
    thumb.style.display = 'block';
    document.getElementById('gen-btn').disabled = false;
  };
  r.readAsDataURL(f);
});

const uz = document.getElementById('upload-zone');
uz.addEventListener('dragover', e => { e.preventDefault(); uz.classList.add('drag'); });
uz.addEventListener('dragleave', () => uz.classList.remove('drag'));
uz.addEventListener('drop', e => {
  e.preventDefault();
  uz.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = e2 => {
    sourceDataUrl = e2.target.result;
    document.getElementById('source-thumb').src = sourceDataUrl;
    document.getElementById('source-thumb').style.display = 'block';
    document.getElementById('gen-btn').disabled = false;
  };
  r.readAsDataURL(f);
});

// ── GENERATE ──────────────────────────────────────
let frames = [];
let sheetCanvas = null;
let animTimer = null;
let animFrame = 0;
let fps = 10;
let playing = true;
let totalCost = 0;

async function generate() {
  if (!sourceDataUrl) return;

  const frameCount = parseInt(document.getElementById('frame-count').value);
  const animType = document.getElementById('anim-type').value;
  const artStyle = document.getElementById('art-style').value;
  const bgType = document.getElementById('bg-type').value;
  const refBase64 = sourceDataUrl.split(',')[1];
  const refMime = sourceDataUrl.split(';')[0].split(':')[1];

  frames = [];
  totalCost = 0;
  document.getElementById('gen-btn').disabled = true;
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('err-msg').style.display = 'none';

  const progCard = document.getElementById('progress-card');
  progCard.style.display = 'block';
  progCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  // Frame thumbnails
  const strip = document.getElementById('frames-strip');
  strip.innerHTML = '';
  for (let i = 0; i < frameCount; i++) {
    const img = document.createElement('img');
    img.className = 'frame-thumb';
    img.id = `ft-${i}`;
    strip.appendChild(img);
  }

  setProgress(0, 'Karakter analiz ediliyor...');

  try {
    // 1. Describe character with vision
    const descData = await callGemini('gemini-2.5-flash', {
      contents: [{
        parts: [
          { text: 'Describe this game character in detail: body shape, colors, clothing, accessories, art style. Be specific. Max 3 sentences.' },
          { inline_data: { mime_type: refMime, data: refBase64 } }
        ]
      }],
      generationConfig: { maxOutputTokens: 200 }
    });
    const charDesc = descData.candidates[0].content.parts[0].text;
    setProgress(8, `Karakter: ${charDesc.substring(0, 80)}...`);

    // 2. Generate frames one by one
    for (let i = 0; i < frameCount; i++) {
      const thumb = document.getElementById(`ft-${i}`);
      if (thumb) thumb.classList.add('loading');

      const progress = Math.round((i / (frameCount - 1)) * 100);
      const pct = 8 + Math.round(((i + 1) / frameCount) * 88);
      setProgress(pct, `Frame ${i + 1}/${frameCount} üretiliyor...`);

      const prompt = `Generate a single sprite animation frame.

CHARACTER: ${charDesc}
ANIMATION: ${animType}
STYLE: ${artStyle}
BACKGROUND: ${bgType}
FRAME: ${i + 1} of ${frameCount} (${progress}% through animation cycle)

RULES:
- Keep character appearance IDENTICAL to reference: same colors, proportions, features
- Show the character at exactly ${progress}% through the ${animType}
- ${artStyle}
- ${bgType}
- Character centered, full body visible
- Square composition, no text, no UI`;

      const imgData = await callGemini('gemini-2.5-flash-image', {
        contents: [{
          parts: [
            { text: prompt },
            { inline_data: { mime_type: refMime, data: refBase64 } }
          ]
        }],
        generationConfig: {
          responseModalities: ['IMAGE', 'TEXT']
        }
      });

      let imgUrl = null;
      for (const part of imgData.candidates[0].content.parts) {
        if (part.inlineData) {
          imgUrl = `data:${part.inlineData.mimeType};base64,${part.inlineData.data}`;
          break;
        }
      }
      if (!imgUrl) throw new Error(`Frame ${i + 1} için görsel üretilemedi`);

      frames.push(imgUrl);
      totalCost += 0.039;

      if (thumb) {
        thumb.src = imgUrl;
        thumb.classList.remove('loading');
        thumb.classList.add('done');
      }
    }

    setProgress(100, `✓ ${frameCount} frame tamamlandı · $${totalCost.toFixed(2)} harcandı`);
    await buildSpriteSheet();
    showResult();

  } catch (err) {
    showError(err.message);
  }

  document.getElementById('gen-btn').disabled = false;
}

function setProgress(pct, msg) {
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-log').textContent = msg;
}

function showError(msg) {
  const el = document.getElementById('err-msg');
  el.textContent = '✗ ' + msg;
  el.style.display = 'block';
  setProgress(0, 'Hata oluştu');
}

async function loadImg(url) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => res(img);
    img.onerror = rej;
    img.src = url;
  });
}

async function buildSpriteSheet() {
  const imgs = await Promise.all(frames.map(loadImg));
  const fw = imgs[0].naturalWidth;
  const fh = imgs[0].naturalHeight;
  const size = Math.min(fw, fh, 256);

  const c = document.createElement('canvas');
  c.width = size * frames.length;
  c.height = size;
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  imgs.forEach((img, i) => ctx.drawImage(img, i * size, 0, size, size));
  sheetCanvas = c;

  const sc = document.getElementById('sheet-canvas');
  sc.width = c.width;
  sc.height = c.height;
  sc.getContext('2d').drawImage(c, 0, 0);
}

function showResult() {
  const rc = document.getElementById('result-card');
  rc.style.display = 'block';
  rc.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  document.getElementById('cost-tag').textContent =
    `Maliyet: ~$${totalCost.toFixed(3)} · ${frames.length} frame × $0.039 (Nano Banana)\nGünlük ücretsiz kota: ~50 istek (Google AI Studio)`;
  startAnim();
}

// ── ANIMATION ─────────────────────────────────────
function startAnim() {
  if (animTimer) clearInterval(animTimer);
  animFrame = 0;
  playing = true;
  document.getElementById('play-btn').textContent = '⏸ Durdur';
  runAnim();
}

function runAnim() {
  if (animTimer) clearInterval(animTimer);
  animTimer = setInterval(() => {
    if (!sheetCanvas) return;
    const ac = document.getElementById('anim-canvas');
    const ctx = ac.getContext('2d');
    const fw = sheetCanvas.height;
    ctx.clearRect(0, 0, ac.width, ac.height);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(sheetCanvas, animFrame * fw, 0, fw, fw, 0, 0, 128, 128);
    animFrame = (animFrame + 1) % frames.length;
  }, 1000 / fps);
}

function togglePlay() {
  playing = !playing;
  document.getElementById('play-btn').textContent = playing ? '⏸ Durdur' : '▶ Oynat';
  if (playing) runAnim();
  else clearInterval(animTimer);
}

function setFps(v) {
  fps = parseInt(v);
  document.getElementById('fps-val').textContent = v;
  if (playing) runAnim();
}

function downloadSheet() {
  if (!sheetCanvas) return;
  const a = document.createElement('a');
  a.download = 'spritesheet.png';
  a.href = sheetCanvas.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
